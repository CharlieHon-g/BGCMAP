# BGCMAP Nginx 反向代理配置
# 放置路径: /etc/nginx/conf.d/bgcmap.conf
# Python 后端运行在 127.0.0.1:8000

# 速率限制定义
limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;

server {
    listen 8800;
    server_name _;

    # ===== 安全响应头 =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    proxy_hide_header Server;

    # ===== 已知 API：限流 + 转发 =====
    location ~ ^/api/(health|stats|home|home-phylo|samples|mags|bgcs|gcf-detail|nps|downloads|np-hierarchy|stats-charts|biome-options|geo-options|category-options|taxon-options|search-suggest)$ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ===== 未知 API：直接 404，不经过 Python =====
    location /api/ {
        return 404;
    }

    # ========== 2. 下载文件 ==========
    location /download-asset/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ========== 4. 页面路由 ==========
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
