# BGCMAP Nginx 反向代理配置
# 放置路径: /etc/nginx/conf.d/bgcmap.conf
# Python 后端运行在 127.0.0.1:8000

# 速率限制定义
limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;

server {
    listen 8800;
    server_name _;

    # ===== 安全响应头 =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    proxy_hide_header Server;

    # ===== CORS 限制：只允许本站访问 API =====
    map $http_origin $cors_allow {
        default 0;
        "~^https?://(202\.194\.20\.64|localhost|127\.0\.0\.1)(:8800)?$" 1;
    }

    # ========== 1. 精确放行已有的 API ==========
    location = /api/health   { proxy_pass http://127.0.0.1:8000; }
    location = /api/stats    { proxy_pass http://127.0.0.1:8000; }
    location = /api/home-phylo { proxy_pass http://127.0.0.1:8000; }
    location = /api/samples  { proxy_pass http://127.0.0.1:8000; }
    location = /api/mags     { proxy_pass http://127.0.0.1:8000; }
    location = /api/bgcs     { proxy_pass http://127.0.0.1:8000; }
    location = /api/gcf-detail { proxy_pass http://127.0.0.1:8000; }
    location = /api/nps      { proxy_pass http://127.0.0.1:8000; }
    location = /api/downloads { proxy_pass http://127.0.0.1:8000; }
    location = /api/np-hierarchy { proxy_pass http://127.0.0.1:8000; }
    location = /api/stats-charts { proxy_pass http://127.0.0.1:8000; }
    location = /api/biome-options { proxy_pass http://127.0.0.1:8000; }
    location = /api/geo-options { proxy_pass http://127.0.0.1:8000; }
    location = /api/category-options { proxy_pass http://127.0.0.1:8000; }
    location = /api/taxon-options { proxy_pass http://127.0.0.1:8000; }
    location = /api/search-suggest { proxy_pass http://127.0.0.1:8000; }

    # 未知 API 路径 → 直接 404，不经过 Python
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        return 404;
    }

    # ========== 2. 静态文件 - Nginx 直接处理 ==========
    location /static/ {
        alias /root/bgc_database/web/;
        expires 30d;
    }

    # ========== 3. 下载文件 ==========
    location /download-asset/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ========== 4. 页面路由 ==========
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
