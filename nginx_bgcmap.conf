# BGCMAP Nginx 配置
# Python 后端运行在 127.0.0.1:8000

limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;

server {
    listen 8800;
    server_name _;
    server_tokens off;

    # ===== 安全响应头 =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    proxy_hide_header Server;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_types text/html;
    gzip_min_length 1000;
    gzip_vary on;

    # ===== 全局拦截隐藏文件 / 敏感文件 =====
    location ~ /\. {
        return 404;
    }

    # ===== 1. 静态文件 - 由 Python 处理（权限原因不过 Nginx） =====
    # ===== 1. 健康检查 - 仅内网可用 =====
    location = /api/health {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000;
    }

    # ===== 3. antismash - 转发 Python（有路径检查） =====
    # ===== 4. 其他 API - API Key 校验 + 限流后转发 =====
    location /api/ {
        if ($http_x_api_key != "bgcmap2026") { return 401; }
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ===== 5. 下载文件 - 转发 Python =====
    location /download-asset/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ===== 6. 页面路由 - 转发 Python（负责 /sample、/bgc 等路由） =====
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
