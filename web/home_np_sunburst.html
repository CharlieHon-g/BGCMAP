<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NP Hierarchy · BGCMAP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#eef2f6;font-family:system-ui,-apple-system,sans-serif}
svg{display:block;width:100%;height:100%}.bb{position:absolute;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);z-index:20;cursor:pointer;opacity:0;pointer-events:none;transition:all .4s ease;background:#fff;border:1px solid #d4dfef;border-radius:24px;padding:10px 26px;font-size:14px;font-weight:600;color:#42586b;box-shadow:0 2px 8px rgba(43,110,176,.06)}
.bb.s{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}.bb:hover{border-color:#8aaac8}
.tp{position:absolute;pointer-events:none;background:#1a2c3e;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;line-height:1.5;max-width:320px;opacity:0;transition:opacity .2s;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.tp.s{opacity:1}.tp .n{font-weight:600;font-size:13px}.tp .c{color:#8ab4f8;font-size:11px;margin-top:2px}
.hd{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;padding:0 30px;background:#eef2f6;border-bottom:1px solid rgba(180,200,220,.3);z-index:10}
.hd h2{font-size:13px;font-weight:700;color:#1a2c3e;letter-spacing:.6px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.hd .sg{font-size:11px;color:#6a8aa8;margin-left:auto;display:flex;gap:18px}
.hd .sg span{display:flex;align-items:center;gap:4px}.hd .sg strong{color:#1a2c3e;font-weight:700}
</style>
</head>
<body>
<div class="hd"><h2><span style="width:6px;height:6px;border-radius:50%;background:#2b6eb0;display:inline-block"></span>NP Class Hierarchy</h2>
  <div class="sg"><span>Pathways <strong id="s1">—</strong></span><span>Classes <strong id="s2">—</strong></span><span>Total <strong id="s3">—</strong></span></div>
</div>
<div class="tp" id="tp"><div class="n" id="tn"></div><div class="c" id="tc"></div></div>
<div class="bb" id="bb">← Back</div>
<svg viewBox="0 0 2000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".12"/></filter>
    <pattern id="dot" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.6" fill="#d0dce8" opacity=".25"/></pattern>
  </defs>
  <rect width="2000" height="1000" fill="#f2f6fa"/>
  <rect width="2000" height="1000" fill="url(#dot)"/>
  <!-- Background reference rings -->
  <circle cx="1300" cy="500" r="480" fill="none" stroke="rgba(180,200,220,.12)" stroke-width="0.5"/>
  <circle cx="1300" cy="500" r="320" fill="none" stroke="rgba(180,200,220,.08)" stroke-width="0.5" stroke-dasharray="3,6"/>
  <circle cx="1300" cy="500" r="120" fill="none" stroke="rgba(180,200,220,.06)" stroke-width="0.5" stroke-dasharray="2,5"/>
  <g id="ch"></g>
  <rect x="240" y="280" width="430" height="590" fill="transparent" style="cursor:pointer" onclick="window.top.location='/np'"/>
</svg>
<script>
var PWC={'Alkaloids':['#d6e6f5','#74b0d8','#4a90c4','#2b6eb0'],
  'Amino acids and Peptides':['#d0ece0','#5cb890','#3a9a74','#2a7a5a'],
  'Carbohydrates':['#e8dcc8','#c8ae80','#a89058','#8a7848'],
  'Fatty acids':['#dcd0e8','#a888c0','#8868a4','#684888'],
  'Polyketides':['#ecd4c8','#c89c80','#a87c5c','#88644a'],
  'Shikimates and Phenylpropanoids':['#d0dcee','#8aa8d0','#6088b4','#4870a0'],
  'Terpenoids':['#d8ecd8','#6ab890','#4a9a74','#2a7a5a']};
var tp=document.getElementById('tp'),tn=document.getElementById('tn'),tc=document.getElementById('tc');
var bb=document.getElementById('bb'),ch=document.getElementById('ch');
var X=1300,Y=500,R0=55;
var NS='http://www.w3.org/2000/svg';

function mk(r){return '/np?filters='+encodeURIComponent(JSON.stringify({type:'group',combinator:'and',negated:false,rules:r}))}
function sv(t){return t?t.split(';').map(function(s){return s.trim()}).filter(Boolean):[]}
function mr(a,b){return(a+b)/2}
function po(r,a){return{x:X+r*Math.cos(a),y:Y+r*Math.sin(a)}}

function seg(a1,a2,r){
  var i=R0+4,o=r-3;
  var x1=X+i*Math.cos(a1),y1=Y+i*Math.sin(a1);
  var x2=X+o*Math.cos(a1+0.04),y2=Y+o*Math.sin(a1+0.04);
  var x3=X+o*Math.cos(a2-0.04),y3=Y+o*Math.sin(a2-0.04);
  var x4=X+i*Math.cos(a2),y4=Y+i*Math.sin(a2);
  return 'M'+x1+','+y1+'L'+x2+','+y2+'A'+o+','+o+' 0 '+(a2-a1>Math.PI?1:0)+' 1 '+x3+','+y3+'L'+x4+','+y4+'A'+i+','+i+' 0 '+(a2-a1>Math.PI?1:0)+' 0 '+x1+','+y1;
}

function sh(n,c2){tn.textContent=n;tc.textContent=Math.round(c2).toLocaleString()+' entries';tp.classList.add('s')}
function mv(e){tp.style.left=(e.clientX+15)+'px';tp.style.top=(e.clientY+15)+'px'}
function hd2(){tp.classList.remove('s')}

var pwA={},scA={},tot=0,pws=[],scD={};
function bk(){bb.classList.remove('s');drOv()}

function drOv(){
  ch.innerHTML='';bb.classList.remove('s');bb.onclick=bk;
  var n=pws.length,sa=2*Math.PI/n;
  var st=-Math.PI/2+Math.PI/14;
  var names=['Carbo','Terp','Amino','Fatty','Shiki','Alkalo','Poly'];
  var radii=[420,360,490,310,520,240,280];

  // Center
  var cg=document.createElementNS(NS,'g');
  // Center glow ring
  var cg2=document.createElementNS(NS,'circle');
  cg2.setAttribute('cx',X);cg2.setAttribute('cy',Y);
  cg2.setAttribute('r',R0+2);cg2.setAttribute('fill','none');
  cg2.setAttribute('stroke','rgba(180,200,220,.3)');cg2.setAttribute('stroke-width','1');
  cg.appendChild(cg2);
  var ct=document.createElementNS(NS,'text');
  ct.setAttribute('x',X);ct.setAttribute('y',Y-5);ct.setAttribute('text-anchor','middle');
  ct.setAttribute('font-size','44');ct.setAttribute('font-weight','900');ct.setAttribute('fill','#1a2c3e');
  ct.textContent='NP';cg.appendChild(ct);
  var cs=document.createElementNS(NS,'text');
  cs.setAttribute('x',X);cs.setAttribute('y',Y+24);cs.setAttribute('text-anchor','middle');
  cs.setAttribute('font-size','14');cs.setAttribute('fill','#6a8aa8');
  cs.textContent=Math.round(tot).toLocaleString();cg.appendChild(cs);
  ch.appendChild(cg);

  // Draw petals with border blending
  for(var i=0;i<pws.length;i++){
    var pw=names[i];
    var fullPw=pws.filter(function(p){return p.indexOf(pw)>=0})[0]||pws[i];
    var a1=st,a2=st+sa;
    var f=PWC[fullPw]||['#ccc'];
    var r=radii[i];
    // Create radial gradient fill: light center → medium edge
    var gid='sg'+i;
    var sgrad=document.createElementNS(NS,'radialGradient');
    sgrad.setAttribute('id',gid);sgrad.setAttribute('cx','40%');sgrad.setAttribute('cy','40%');sgrad.setAttribute('r','70%');
    var ss1=document.createElementNS(NS,'stop');ss1.setAttribute('offset','0%');ss1.setAttribute('stop-color',f[0]);
    sgrad.appendChild(ss1);
    var ss2=document.createElementNS(NS,'stop');ss2.setAttribute('offset','100%');ss2.setAttribute('stop-color',f[1]);
    sgrad.appendChild(ss2);
    document.querySelector('svg defs').appendChild(sgrad);

    // Create stroke gradient: dark at outer edge → transparent
    var srid='st'+i;
    var stgrad=document.createElementNS(NS,'linearGradient');
    stgrad.setAttribute('id',srid);stgrad.setAttribute('x1','100%');stgrad.setAttribute('y1','100%');
    stgrad.setAttribute('x2','0%');stgrad.setAttribute('y2','0%');
    var st1=document.createElementNS(NS,'stop');st1.setAttribute('offset','0%');st1.setAttribute('stop-color',f[3]);st1.setAttribute('stop-opacity','.8');
    stgrad.appendChild(st1);
    var st2=document.createElementNS(NS,'stop');st2.setAttribute('offset','70%');st2.setAttribute('stop-color',f[3]);st2.setAttribute('stop-opacity','.15');
    stgrad.appendChild(st2);
    var st3=document.createElementNS(NS,'stop');st3.setAttribute('offset','100%');st3.setAttribute('stop-color',f[3]);st3.setAttribute('stop-opacity','0');
    stgrad.appendChild(st3);
    document.querySelector('svg defs').appendChild(stgrad);

    var g=document.createElementNS(NS,'g');g.style.cursor='pointer';g.style.filter='url(#shadow)';

    // Solid light fill
    var p=document.createElementNS(NS,'path');
    p.setAttribute('d',seg(a1,a2,r));
    p.setAttribute('fill',f[1]);
    p.setAttribute('stroke','none');
    g.appendChild(p);

    // Solid dark border
    var pb=document.createElementNS(NS,'path');
    pb.setAttribute('d',seg(a1,a2,r));
    pb.setAttribute('fill','none');
    pb.setAttribute('stroke',f[3]);
    pb.setAttribute('stroke-width','2.5');
    pb.setAttribute('opacity','.7');
    g.appendChild(pb);

    // Label
    var ma=mr(a1,a2),lp=po((R0+r)/2,ma);
    var rt=ma*180/Math.PI,fl=rt>90&&rt<270;
    var lb=document.createElementNS(NS,'text');
    lb.setAttribute('x',lp.x);lb.setAttribute('y',lp.y+1);lb.setAttribute('text-anchor','middle');
    lb.setAttribute('font-size','26');lb.setAttribute('font-weight','900');lb.setAttribute('fill','#fff');
    lb.setAttribute('transform','rotate('+(fl?rt+180:rt)+','+lp.x+','+lp.y+')');
    lb.textContent=fullPw;
    g.appendChild(lb);

    (function(pw0){
      g.addEventListener('mouseenter',function(){sh(pw0,pwA[pw0]);this.style.opacity='.85'});
      g.addEventListener('mousemove',mv);
      g.addEventListener('mouseleave',function(){hd2();this.style.opacity='1'});
      g.addEventListener('click',function(){bb.classList.add('s');drDt(pw0)});
    })(fullPw);
    ch.appendChild(g);
    st+=sa;
  }
  drawCloud();
}

function drawCloud(){
  var smiles=[
    'c1ccccc1','CC(=O)','CC(C)C','CCO','CNC','CCN','CCC=O','OC=O',
    'CC=C','c1ccc(cc1)','CCCC','C=N','CC#N','COC','CCCC=O','C=C(C)C',
    'c1ccccc1C','CC(=O)C','NC=O','CC(C)=O','C1CCCCC1','OCc1ccccc1','NCC',
    'c1ccccc1O','CCN(C)C','CC(O)=O','CSc1ccccc1','CC(=O)N','CCCl',
    'O=C(O)c1ccccc1','CC(C)(C)','CN(C)C','CC(=O)Oc1ccccc1','c1ccncc1','CCCN',
    'C=CC','CC#C','CSC','c1ncccn1','CC(=O)O','c1ccoc1','CC(C)O',
    'CCNc1ccccc1','OCC','NCCN','CCOC','CC(=O)CC','c1ccnc1','c1ccncc1C',
    'CNCC','CC(=O)NCC','OCCN','c1ccc(N)cc1','CC(O)CC','NCCc1ccccc1',
    'CC(=O)OC','CCOC(=O)','CC(C)CC','CCC(C)C','CCl','CN1CCCCC1'
  ];
  var pos=[
    [260,375,48,-3,1],[480,365,42,2,0.92],[260,475,36,1,0.85],
    [480,465,32,-2,0.78],[260,565,30,2,0.7],[480,555,28,-1,0.62],
    [260,655,26,1,0.55],[480,645,24,-3,0.48],[260,745,22,-2,0.42],
    [480,735,20,1,0.38],
    [280,400,16,-2,0.52],[460,690,15,1,0.48],[300,830,14,-1,0.45],
    [370,420,22,-1,0.55],[560,405,20,3,0.5],
    [370,520,20,2,0.48],[560,510,18,-2,0.44],
    [370,610,18,-1,0.4],[560,600,16,1,0.36],
    [370,700,16,3,0.32],[560,690,14,-1,0.28],
    [370,790,14,-2,0.25],[560,780,13,2,0.22],
    [310,405,14,1,0.25],[420,395,12,-1,0.2],[520,385,11,2,0.18],
    [310,495,13,-2,0.22],[420,488,11,1,0.18],[520,478,10,-1,0.15],
    [310,585,12,2,0.2],[420,578,10,-3,0.16],[520,570,9,1,0.14],
    [310,675,11,-1,0.18],[420,668,10,2,0.15],[520,660,9,-2,0.12],
    [310,765,10,1,0.15],[420,758,9,-1,0.12],[520,750,8,2,0.1],
    [310,845,9,-1,0.12],[420,838,8,1,0.1],[520,832,8,-2,0.08],
    [270,440,10,-2,0.18],[490,430,9,1,0.15],[270,530,9,2,0.16],
    [490,522,8,-1,0.13],[270,620,8,-1,0.14],[490,612,8,2,0.11],
    [270,710,8,1,0.12],[490,702,7,-2,0.1],[270,800,7,-1,0.1],
    [490,792,7,1,0.08],[350,450,11,2,0.2],
    [340,350,12,1,0.15],[450,358,10,-2,0.12],[570,352,9,2,0.1],
    [340,540,10,-1,0.12],[450,535,9,1,0.1],[570,530,8,-2,0.08],
    [340,830,9,1,0.09],[450,825,8,-1,0.08],[570,820,7,2,0.06]
  ];
  for(var w=0;w<smiles.length;w++){
    var p=pos[w];
    var cx=p[0],cy=p[1],fs=p[2],rot=p[3],om=p[4];
    var wt=document.createElementNS(NS,'text');
    wt.setAttribute('x',cx);wt.setAttribute('y',cy);
    wt.setAttribute('text-anchor','start');wt.setAttribute('font-size',fs);
    wt.setAttribute('font-weight',fs>=22?'900':fs>=17?'800':fs>=13?'700':fs>=10?'600':'300');
    wt.setAttribute('font-family','monospace');
    var op=om*(fs>=22?0.55:fs>=17?0.42:fs>=13?0.3:fs>=10?0.2:0.1);
    wt.setAttribute('fill','rgba(25,55,105,'+op+')');
    wt.setAttribute('transform','rotate('+rot+','+cx+','+cy+')');
    wt.textContent=smiles[w];
    ch.appendChild(wt);
  }
}

function drDt(pw){
  ch.innerHTML='';bb.classList.add('s');bb.onclick=bk;
  var scs=scD[pw]||[];if(!scs.length){drOv();return}
  var f=PWC[pw]||['#ccc'];
  var limit=16;
  var main=scs.slice(0,limit);
  var rest=scs.slice(limit);
  var rc=rest.reduce(function(s,x){return s+x.cnt},0);
  var disp=rest.length>0?main.concat([{name:'+'+rest.length,isOther:true,cnt:rc}]):main;
  var n=disp.length,sa=2*Math.PI/n,st=-Math.PI/2;
  // Assign radii based on name length
  var scRadii=[];
  for(var i=0;i<disp.length;i++){
    if(disp[i].isOther){scRadii.push(280);continue}
    var len=disp[i].name.length;
    var r=Math.max(280,Math.min(520,300+len*12));
    scRadii.push(r);
  }

  var cg=document.createElementNS(NS,'g');cg.style.cursor='pointer';
  var bg=document.createElementNS(NS,'circle');
  bg.setAttribute('cx',X);bg.setAttribute('cy',Y);bg.setAttribute('r',R0-4);
  bg.setAttribute('fill',f[1]);bg.setAttribute('stroke',f[3]);bg.setAttribute('stroke-width','2');
  cg.appendChild(bg);
  var ct=document.createElementNS(NS,'text');
  ct.setAttribute('x',X);ct.setAttribute('y',Y-5);ct.setAttribute('text-anchor','middle');
  ct.setAttribute('font-size','17');ct.setAttribute('font-weight','800');ct.setAttribute('fill','#1a2c3e');
  ct.textContent=pw.length>8?pw.slice(0,7)+'…':pw;cg.appendChild(ct);
  var cs=document.createElementNS(NS,'text');
  cs.setAttribute('x',X);cs.setAttribute('y',Y+18);cs.setAttribute('text-anchor','middle');
  cs.setAttribute('font-size','13');cs.setAttribute('fill','#42586b');
  cs.textContent=Math.round(pwA[pw]).toLocaleString();cg.appendChild(cs);
  (function(pw0){
    cg.addEventListener('click',function(){window.top.location=mk([{type:'rule',id:'r1',field:'np_pathway',operator:'equals',value:pw0}])});
    cg.addEventListener('mouseenter',function(){sh('Click to filter',pwA[pw0])});
  })(pw);
  cg.addEventListener('mousemove',mv);cg.addEventListener('mouseleave',hd2);
  ch.appendChild(cg);

  for(var i=0;i<disp.length;i++){
    var sc=disp[i],a1=st,a2=st+sa;
    var col=f[Math.min(i%3+1,f.length-1)];
    var r=scRadii[i];
    var g=document.createElementNS(NS,'g');g.style.cursor='pointer';g.dataset.sc='1';
    var p=document.createElementNS(NS,'path');
    p.setAttribute('d',seg(a1,a2,r));p.setAttribute('fill',col);
    p.setAttribute('stroke','none');
    g.appendChild(p);
    // Border with blend
    var pb=document.createElementNS(NS,'path');
    pb.setAttribute('d',seg(a1,a2,r));pb.setAttribute('fill','none');
    pb.setAttribute('stroke',f[3]);pb.setAttribute('stroke-width','2');pb.setAttribute('opacity','.35');
    g.appendChild(pb);

    var ma=mr(a1,a2),lp=po((R0+r)/2,ma);
    var rt=ma*180/Math.PI,fl=rt>90&&rt<270;
    var lb=document.createElementNS(NS,'text');
    lb.setAttribute('x',lp.x);lb.setAttribute('y',lp.y+1);lb.setAttribute('text-anchor','middle');
    lb.setAttribute('font-size','20');lb.setAttribute('font-weight','800');lb.setAttribute('fill','#1a2c3e');
    lb.setAttribute('transform','rotate('+(fl?rt+180:rt)+','+lp.x+','+lp.y+')');
    lb.textContent=sc.name;
    g.appendChild(lb);
    (function(sc0,pw0){
      var oN=sc0.isOther?rest.map(function(s){return s.name}).join(', '):'';
      g.addEventListener('mouseenter',function(){sh(sc0.isOther?oN.slice(0,120):sc0.name,sc0.cnt);this.style.opacity='.85'});
      g.addEventListener('mousemove',mv);
      g.addEventListener('mouseleave',function(){hd2();this.style.opacity='1'});
      g.addEventListener('click',function(){
        if(sc0.isOther)window.top.location=mk([{type:'rule',id:'r1',field:'np_pathway',operator:'equals',value:pw0}]);
        else window.top.location=mk([{type:'rule',id:'r1',field:'np_pathway',operator:'equals',value:pw0},{type:'rule',id:'r2',field:'np_superclass',operator:'equals',value:sc0.name}]);
      });
    })(sc,pw);
    ch.appendChild(g);
    st+=sa;
  }
  requestAnimationFrame(function(){
    ch.querySelectorAll('[data-sc="1"]').forEach(function(g,i){
      g.style.opacity='0';g.style.transition='opacity .35s ease, transform .35s ease';
      g.style.transform='scale(0.93)';
      setTimeout(function(){g.style.opacity='1';g.style.transform='scale(1)'},20+i*8);
    });
  });
  drawCloud();
}

fetch('/api/np-hierarchy', { headers: { "X-API-Token": "bgcmap2026" } }).then(function(r){return r.json()}).then(function(d){
  var rows=d.rows;pwA={};scA={};tot=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r.superclass&&!r.class){
      var p=sv(r.pathway);if(!p.length)continue;
      for(var j=0;j<p.length;j++){pwA[p[j]]=(pwA[p[j]]||0)+r.cnt}
      tot+=r.cnt;
    }
  }
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r.superclass||r.class)continue;
    var p=sv(r.pathway),s=sv(r.superclass);
    if(!p.length||!s.length)continue;
    for(var j=0;j<p.length;j++){for(var k=0;k<s.length;k++){scA[p[j]+'|||'+s[k]]=(scA[p[j]+'|||'+s[k]]||0)+r.cnt}}
  }
  pws=Object.keys(pwA).sort(function(a,b){return pwA[b]-pwA[a]});
  var ss={};for(var k in scA){ss[k.split('|||')[1]]=1}
  document.getElementById('s1').textContent=pws.length;
  document.getElementById('s2').textContent=Object.keys(ss).length;
  document.getElementById('s3').textContent=Math.round(tot).toLocaleString();
  for(var i=0;i<pws.length;i++){
    var pw=pws[i];
    scD[pw]=Object.keys(scA).filter(function(k){return k.startsWith(pw+'|||')}).map(function(k){return{name:k.split('|||')[1],cnt:scA[k]}}).sort(function(a,b){return b.cnt-a.cnt});
  }
  drOv();
}).catch(function(e){
  var t=document.createElementNS(NS,'text');
  t.setAttribute('x',X);t.setAttribute('y',Y);t.setAttribute('text-anchor','middle');
  t.setAttribute('fill','#c00');t.setAttribute('font-size',16);
  t.textContent='Error: '+e.message;
  ch.appendChild(t);
});
</script>
</body>
</html>
