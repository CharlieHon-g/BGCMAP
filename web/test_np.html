<!doctype html>
<html><body>
<h2>NP API Test</h2>
<pre id="out">Loading...</pre>
<script>
fetch('/api/np-hierarchy').then(r=>r.json()).then(d=>{
  document.getElementById('out').textContent = 
    'Rows: ' + d.rows.length + '\n' +
    'Pathways: ' + [...new Set(d.rows.map(r=>r.pathway).filter(Boolean))].length + '\n' +
    'Sample: ' + JSON.stringify(d.rows.slice(0,3), null, 2);
}).catch(e => {
  document.getElementById('out').textContent = 'Error: ' + e.message;
});
</script>
</body></html>
