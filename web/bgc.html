<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BGC · BGCMAP</title>
  <link rel="stylesheet" href="/static/style.css?v=20260715">
</head>
<body data-page="bgc">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand-title" href="/">
        <span class="brand-mark"><img class="diamond-icon" src="/static/assets/bgcmap_compass_v3.svg" alt=""><strong>BGCMAP</strong></span>
      </a>
      <nav class="top-nav">
        <a data-page="home" href="/">Home</a>
        <a data-page="sample" href="/sample">Sample</a>
        <a data-page="tax" href="/tax">Taxon</a>
        <a data-page="bgc" href="/bgc">BGC</a>
        <a data-page="np" href="/np">NP</a>
        <a data-page="stats" href="/stats">Stat</a>
        <a data-page="download" href="/download">Download</a>
        <a data-page="help" href="/help">Help</a>
      </nav>
    </div>
  </header>
  <main class="page-shell">
    <div class="container">
      <section class="table-card">
        <div class="table-header">
          <div class="table-title-row">
            <h2>BGC records</h2>
            <button type="button" class="table-toggle-btn" id="tax-expand-toggle" aria-label="Expand all lineages">
              <span class="toggle-caret">▸</span>
              <span class="toggle-label">Expand all lineages</span>
            </button>
          </div>
          <div class="table-header-actions">
            <select id="page-size">
              <option value="10">10</option>
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
            <div id="entries-label" class="table-meta">Showing 0 to 0 of 0 entries</div>
          </div>
        </div>
        <div id="detail-panel"></div>
        <div id="table-root" class="table-wrap"></div>
        <div id="pager-root"></div>
      </section>
      <div id="page-error" class="footer-note"></div>
    </div>
  </main>
  <script src="/static/app.js?v=20260718"></script>
</body>
</html>
