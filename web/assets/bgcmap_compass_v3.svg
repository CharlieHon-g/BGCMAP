<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="500" height="520">
  <defs>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#183044"/>
      <stop offset="100%" stop-color="#1e3a52"/>
    </linearGradient>
  </defs>

  <rect width="500" height="520" fill="#f5f9fd"/>

  <g transform="translate(250, 225)">

    <!-- Outer decorative ring -->
    <circle cx="0" cy="0" r="162" fill="none" stroke="#d8e4ef" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="158" fill="none" stroke="#d8e4ef" stroke-width="1.5"/>

    <!-- Degree tick marks around edge -->
    <g stroke="#c5d7e8" stroke-width="1">
      <line x1="0" y1="-156" x2="0" y2="-150"/>
      <line x1="27" y1="-153.6" x2="26" y2="-147.8"/>
      <line x1="53" y1="-144.8" x2="51" y2="-139.4"/>
      <line x1="78" y1="-129.4" x2="75" y2="-124.5"/>
      <line x1="100" y1="-108.5" x2="96.5" y2="-104.4"/>
      <line x1="118.5" y1="-82.5" x2="114.3" y2="-79.4"/>
      <line x1="131.5" y1="-53" x2="127" y2="-51"/>
      <line x1="139.5" y1="-27" x2="134.8" y2="-26"/>
      <line x1="156" y1="0" x2="150" y2="0"/>
      <line x1="139.5" y1="27" x2="134.8" y2="26"/>
      <line x1="131.5" y1="53" x2="127" y2="51"/>
      <line x1="118.5" y1="82.5" x2="114.3" y2="79.4"/>
      <line x1="100" y1="108.5" x2="96.5" y2="104.4"/>
      <line x1="78" y1="129.4" x2="75" y2="124.5"/>
      <line x1="53" y1="144.8" x2="51" y2="139.4"/>
      <line x1="27" y1="153.6" x2="26" y2="147.8"/>
      <line x1="0" y1="156" x2="0" y2="150"/>
      <line x1="-27" y1="153.6" x2="-26" y2="147.8"/>
      <line x1="-53" y1="144.8" x2="-51" y2="139.4"/>
      <line x1="-78" y1="129.4" x2="-75" y2="124.5"/>
      <line x1="-100" y1="108.5" x2="-96.5" y2="104.4"/>
      <line x1="-118.5" y1="82.5" x2="-114.3" y2="79.4"/>
      <line x1="-131.5" y1="53" x2="-127" y2="51"/>
      <line x1="-139.5" y1="27" x2="-134.8" y2="26"/>
      <line x1="-156" y1="0" x2="-150" y2="0"/>
      <line x1="-139.5" y1="-27" x2="-134.8" y2="-26"/>
      <line x1="-131.5" y1="-53" x2="-127" y2="-51"/>
      <line x1="-118.5" y1="-82.5" x2="-114.3" y2="-79.4"/>
      <line x1="-100" y1="-108.5" x2="-96.5" y2="-104.4"/>
      <line x1="-78" y1="-129.4" x2="-75" y2="-124.5"/>
      <line x1="-53" y1="-144.8" x2="-51" y2="-139.4"/>
      <line x1="-27" y1="-153.6" x2="-26" y2="-147.8"/>
    </g>

    <!-- Major tick marks at N/E/S/W -->
    <g stroke="#183044" stroke-width="2">
      <line x1="0" y1="-156" x2="0" y2="-147"/>
      <line x1="156" y1="0" x2="147" y2="0"/>
      <line x1="0" y1="156" x2="0" y2="147"/>
      <line x1="-156" y1="0" x2="-147" y2="0"/>
    </g>

    <!-- ===== COMPASS ROSE — classic 4-diamond shape ===== -->

    <!-- N diamond: PKS (Red) — most prominent -->
    <polygon points="0,-145 -18,-22 0,-35 18,-22" fill="#c0392b"/>
    <!-- Shadow side of N -->
    <polygon points="0,-145 18,-22 0,-35" fill="#a93226"/>

    <!-- S diamond: NRPS (Teal) -->
    <polygon points="0,145 -18,22 0,35 18,22" fill="#0e8a7d"/>
    <polygon points="0,145 18,22 0,35" fill="#0a7066"/>

    <!-- E diamond: Terpene (Gold) -->
    <polygon points="145,0 22,-18 35,0 22,18" fill="#d4ac0d"/>
    <polygon points="145,0 22,18 35,0" fill="#b8960b"/>

    <!-- W diamond: RiPP (Purple) -->
    <polygon points="-145,0 -22,-18 -35,0 -22,18" fill="#8e44ad"/>
    <polygon points="-145,0 -22,18 -35,0" fill="#7d3c98"/>

    <!-- Secondary thin diamonds between main points (decorative) -->
    <polygon points="102,-102 18,-14 22,-18 14,-22" fill="#c5d7e8" opacity="0.4"/>
    <polygon points="102,102 18,14 22,18 14,22" fill="#c5d7e8" opacity="0.4"/>
    <polygon points="-102,-102 -18,-14 -22,-18 -14,-22" fill="#c5d7e8" opacity="0.4"/>
    <polygon points="-102,102 -18,14 -22,18 -14,22" fill="#c5d7e8" opacity="0.4"/>

    <!-- Center hub -->
    <circle cx="0" cy="0" r="38" fill="url(#ink)"/>
    <circle cx="0" cy="0" r="34" fill="#d8e4ef"/>
    <circle cx="0" cy="0" r="32" fill="#f5f9fd"/>

    <!-- ===== INSIDE CENTER: BGC → Molecule ===== -->

    <!-- Top: gene arrows (BGC identity) -->
    <path d="M-16,-20 L-4,-20 L-4,-25 L4,-16 L-4,-10 L-4,-15 L-16,-15 Z" fill="#c0392b"/>
    <path d="M-1,-20 L11,-20 L11,-24 L18,-16 L11,-10 L11,-14 L-1,-14 Z" fill="#0e8a7d"/>

    <!-- Flow arrow -->
    <path d="M-2,-6 L2,-6 L2,-2 L5,-2 L0,3 L-5,-2 L-2,-2 Z" fill="#c5d7e8"/>

    <!-- Bottom: molecular structure -->
    <line x1="-20" y1="8" x2="-12" y2="14" stroke="#183044" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="14" x2="-4" y2="10" stroke="#183044" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="10" x2="4" y2="16" stroke="#183044" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="16" x2="12" y2="12" stroke="#183044" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="20" y2="18" stroke="#183044" stroke-width="2" stroke-linecap="round"/>

    <!-- Branch -->
    <line x1="-12" y1="14" x2="-16" y2="22" stroke="#183044" stroke-width="1.5"/>
    <line x1="4" y1="16" x2="2" y2="24" stroke="#183044" stroke-width="1.5"/>

    <!-- Atoms -->
    <circle cx="-20" cy="8" r="4" fill="#c0392b"/>
    <text x="-20" y="10.5" font-family="Arial,sans-serif" font-weight="700" font-size="5.5" fill="white" text-anchor="middle">O</text>

    <circle cx="-4" cy="10" r="3.5" fill="#2980b9"/>
    <text x="-4" y="12.5" font-family="Arial,sans-serif" font-weight="700" font-size="5" fill="white" text-anchor="middle">N</text>

    <circle cx="12" cy="12" r="3.5" fill="#c0392b"/>
    <text x="12" y="14.5" font-family="Arial,sans-serif" font-weight="700" font-size="5" fill="white" text-anchor="middle">O</text>

    <circle cx="20" cy="18" r="3.5" fill="#27ae60"/>
    <text x="20" y="20.5" font-family="Arial,sans-serif" font-weight="700" font-size="5" fill="white" text-anchor="middle">S</text>

    <circle cx="-16" cy="22" r="3" fill="#e67e22"/>
    <circle cx="2" cy="24" r="3" fill="#667b8f"/>

    <!-- Center pin dot -->
    <circle cx="0" cy="0" r="3" fill="#183044"/>

    <!-- ===== LABELS outside compass ===== -->
    <!-- N label -->
    <text x="0" y="-168" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="13" fill="#c0392b" text-anchor="middle">PKS</text>

    <!-- E label -->
    <text x="172" y="5" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="13" fill="#d4ac0d" text-anchor="middle">Terpene</text>

    <!-- S label -->
    <text x="0" y="180" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="13" fill="#0e8a7d" text-anchor="middle">NRPS</text>

    <!-- W label -->
    <text x="-172" y="5" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="13" fill="#8e44ad" text-anchor="middle">RiPP</text>

  </g>

  <!-- Brand text -->
  <text x="250" y="440" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="44" fill="#183044" text-anchor="middle" letter-spacing="-2">BGCmap</text>
  <text x="250" y="467" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="13" fill="#667b8f" text-anchor="middle" letter-spacing="0.5">Biosynthetic Gene Cluster Explorer</text>
</svg>
