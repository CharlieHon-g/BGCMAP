<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#183044"/>
      <stop offset="100%" stop-color="#1e3a52"/>
    </linearGradient>
    <radialGradient id="globe" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f5f9fd"/>
      <stop offset="70%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#d0dae8"/>
    </radialGradient>
  </defs>

  <g transform="translate(150, 150)">

    <!-- Outer decorative ring (close to pointer tips) -->
    <circle cx="0" cy="0" r="82" fill="none" stroke="#dbe6f8" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="79" fill="none" stroke="#dbe6f8" stroke-width="1"/>

    <!-- Globe shading -->
    <circle cx="0" cy="0" r="78" fill="url(#globe)" opacity="0.4"/>

    <!-- Prime meridian & Equator -->
    <line x1="0" y1="-78" x2="0" y2="78" stroke="#8aaac8" stroke-width="1.2" opacity="0.5"/>
    <line x1="-78" y1="0" x2="78" y2="0" stroke="#8aaac8" stroke-width="1.2" opacity="0.5"/>

    <!-- Tropic lines -->
    <line x1="-72" y1="-35" x2="72" y2="-35" stroke="#d0dce8" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.25"/>
    <line x1="-72" y1="35" x2="72" y2="35" stroke="#d0dce8" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.25"/>

    <!-- Lat/lon grid -->
    <g stroke="#b8cce0" stroke-width="0.7" fill="none" opacity="0.4">
      <ellipse cx="0" cy="0" rx="78" ry="18"/>
      <ellipse cx="0" cy="0" rx="78" ry="38"/>
      <ellipse cx="0" cy="0" rx="78" ry="58"/>
      <ellipse cx="0" cy="0" rx="18" ry="78"/>
      <ellipse cx="0" cy="0" rx="38" ry="78"/>
      <ellipse cx="0" cy="0" rx="58" ry="78"/>
    </g>

    <!-- Atmosphere -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#dbe6f8" stroke-width="2" opacity="0.15"/>

    <!-- Degree tick marks -->
    <g stroke="#d8e4ef" stroke-width="0.7">
      <line x1="0" y1="-80" x2="0" y2="-76"/>
      <line x1="14" y1="-78.5" x2="13" y2="-75"/>
      <line x1="27" y1="-75" x2="26" y2="-71"/>
      <line x1="39" y1="-69" x2="37" y2="-66"/>
      <line x1="50" y1="-60" x2="48" y2="-57"/>
      <line x1="60" y1="-47" x2="57" y2="-45"/>
      <line x1="68" y1="-30" x2="65" y2="-28"/>
      <line x1="74" y1="-10" x2="71" y2="-9"/>
      <line x1="80" y1="0" x2="76" y2="0"/>
      <line x1="74" y1="10" x2="71" y2="9"/>
      <line x1="68" y1="30" x2="65" y2="28"/>
      <line x1="60" y1="47" x2="57" y2="45"/>
      <line x1="50" y1="60" x2="48" y2="57"/>
      <line x1="39" y1="69" x2="37" y2="66"/>
      <line x1="27" y1="75" x2="26" y2="71"/>
      <line x1="14" y1="78.5" x2="13" y2="75"/>
      <line x1="0" y1="80" x2="0" y2="76"/>
      <line x1="-14" y1="78.5" x2="-13" y2="75"/>
      <line x1="-27" y1="75" x2="-26" y2="71"/>
      <line x1="-39" y1="69" x2="-37" y2="66"/>
      <line x1="-50" y1="60" x2="-48" y2="57"/>
      <line x1="-60" y1="47" x2="-57" y2="45"/>
      <line x1="-68" y1="30" x2="-65" y2="28"/>
      <line x1="-74" y1="10" x2="-71" y2="9"/>
      <line x1="-80" y1="0" x2="-76" y2="0"/>
      <line x1="-74" y1="-10" x2="-71" y2="-9"/>
      <line x1="-68" y1="-30" x2="-65" y2="-28"/>
      <line x1="-60" y1="-47" x2="-57" y2="-45"/>
      <line x1="-50" y1="-60" x2="-48" y2="-57"/>
      <line x1="-39" y1="-69" x2="-37" y2="-66"/>
      <line x1="-27" y1="-75" x2="-26" y2="-71"/>
      <line x1="-14" y1="-78.5" x2="-13" y2="-75"/>
    </g>

    <!-- Cardinal directions (inside ring, distinct blue) -->
    <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="7" fill="#4a7aaa" text-anchor="middle">
      <text x="0" y="-73">N</text>
      <text x="77" y="3">E</text>
      <text x="0" y="80">S</text>
      <text x="-77" y="3">W</text>
    </g>

    <!-- ===== COMPASS ROSE ===== -->

    <!-- N: BGC -->
    <polygon points="0,-75 -12,-15 0,-24 12,-15" fill="#c0392b"/>
    <polygon points="0,-75 12,-15 0,-24" fill="#a93226"/>
    <!-- S: Sample -->
    <polygon points="0,75 -12,15 0,24 12,15" fill="#0e8a7d"/>
    <polygon points="0,75 12,15 0,24" fill="#0a7066"/>
    <!-- E: Taxon -->
    <polygon points="75,0 15,-12 24,0 15,12" fill="#d4ac0d"/>
    <polygon points="75,0 15,12 24,0" fill="#b8960b"/>
    <!-- W: NP -->
    <polygon points="-75,0 -15,-12 -24,0 -15,12" fill="#8e44ad"/>
    <polygon points="-75,0 -15,12 -24,0" fill="#7d3c98"/>

    <!-- Secondary decorative diamonds -->
    <polygon points="53,-53 11,-8 14,-11 8,-14" fill="#d8e4ef" opacity="0.5"/>
    <polygon points="53,53 11,8 14,11 8,14" fill="#d8e4ef" opacity="0.5"/>
    <polygon points="-53,-53 -11,-8 -14,-11 -8,-14" fill="#d8e4ef" opacity="0.5"/>
    <polygon points="-53,53 -11,8 -14,11 -8,14" fill="#d8e4ef" opacity="0.5"/>

    <!-- Center hub -->
    <circle cx="0" cy="0" r="34" fill="url(#ink)"/>
    <circle cx="0" cy="0" r="30" fill="#d8e4ef"/>
    <circle cx="0" cy="0" r="28" fill="#f5f9fd"/>

    <!-- BGC → Molecule -->
    <path d="M-13,-17 L-3,-17 L-3,-21 L4,-13 L-3,-7 L-3,-12 L-13,-12 Z" fill="#c0392b"/>
    <path d="M-1,-17 L9,-17 L9,-21 L15,-13 L9,-7 L9,-12 L-1,-12 Z" fill="#0e8a7d"/>
    <path d="M-2,-5 L2,-5 L2,-2 L4,-2 L0,2 L-4,-2 L-2,-2 Z" fill="#c5d7e8"/>
    <line x1="-17" y1="6" x2="-9" y2="11" stroke="#183044" stroke-width="1.8"/>
    <line x1="-9" y1="11" x2="-3" y2="8" stroke="#183044" stroke-width="1.8"/>
    <line x1="-3" y1="8" x2="4" y2="13" stroke="#183044" stroke-width="1.8"/>
    <line x1="4" y1="13" x2="11" y2="10" stroke="#183044" stroke-width="1.8"/>
    <line x1="11" y1="10" x2="16" y2="15" stroke="#183044" stroke-width="1.8"/>
    <line x1="-9" y1="11" x2="-13" y2="18" stroke="#183044" stroke-width="1.3"/>
    <line x1="4" y1="13" x2="2" y2="20" stroke="#183044" stroke-width="1.3"/>
    <circle cx="-17" cy="6" r="3.2" fill="#c0392b"/>
    <text x="-17" y="8.5" font-family="Arial,sans-serif" font-weight="700" font-size="4.5" fill="white" text-anchor="middle">O</text>
    <circle cx="-3" cy="8" r="2.8" fill="#2980b9"/>
    <text x="-3" y="10.2" font-family="Arial,sans-serif" font-weight="700" font-size="4" fill="white" text-anchor="middle">N</text>
    <circle cx="11" cy="10" r="2.8" fill="#c0392b"/>
    <text x="11" y="12.2" font-family="Arial,sans-serif" font-weight="700" font-size="4" fill="white" text-anchor="middle">O</text>
    <circle cx="16" cy="15" r="2.8" fill="#27ae60"/>
    <text x="16" y="17.2" font-family="Arial,sans-serif" font-weight="700" font-size="4" fill="white" text-anchor="middle">S</text>
    <circle cx="-13" cy="18" r="2.2" fill="#e67e22"/>
    <circle cx="2" cy="20" r="2.2" fill="#667b8f"/>

    <!-- Category labels outside ring (all 5px from ring) -->
    <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="10" text-anchor="middle">
      <text x="0" y="-83" fill="#c0392b">BGC</text>
      <text x="83" y="3" fill="#d4ac0d">Taxon</text>
      <text x="0" y="83" fill="#0e8a7d">Sample</text>
      <text x="-83" y="3" fill="#8e44ad">NP</text>
    </g>
  </g>
</svg>
