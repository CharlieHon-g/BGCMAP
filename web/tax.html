<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taxon · BGCMAP</title>
  <link rel="stylesheet" href="/BGCMAP/static/style.css?v=20260720">
</head>
<body data-page="tax">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand-title" href="/BGCMAP">
        <span class="brand-mark"><img class="diamond-icon" src="/BGCMAP/static/assets/bgcmap_logo_v1.svg" alt=""><strong>BGC-MAP</strong></span></a><span class="brand-subtitle">A global prospecting map of biosynthetic gene clusters</span>
      <nav class="top-nav">
        <a data-page="home" href="/BGCMAP">Home</a>
        <a data-page="sample" href="/BGCMAP/sample">Sample</a>
        <a data-page="tax" href="/BGCMAP/tax">Taxon</a>
        <a data-page="bgc" href="/BGCMAP/bgc">BGC</a>
        <a data-page="np" href="/BGCMAP/np">NP</a>
        <a data-page="stats" href="/BGCMAP/stats">Stat</a>
        <a data-page="download" href="/BGCMAP/download">Download</a>
        <a data-page="help" href="/BGCMAP/help">Help</a>
      </nav>
    </div>
  </header>
  <main class="page-shell">
    <div class="container">
      <section class="table-card">
        <div class="table-header">
          <div class="table-title-row">
            <h2>Taxon-linked MAG records</h2>
            <button type="button" class="table-toggle-btn" id="tax-expand-toggle" aria-label="Expand all lineages">
              <span class="toggle-caret">▸</span>
              <span class="toggle-label">Expand all lineages</span>
            </button>
          </div>
          <div class="table-header-actions">
            <select id="page-size">
              <option value="10">10</option>
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
            <div id="entries-label" class="table-meta">Showing 0 to 0 of 0 entries</div>
          </div>
        </div>
        <div id="tax-rank-switcher" class="rank-switcher" aria-label="Taxonomy rank switcher">
          <button type="button" data-tax-mode="phylum">Phylum</button>
          <button type="button" data-tax-mode="class">Class</button>
          <button type="button" data-tax-mode="genus">Genus</button>
          <button type="button" data-tax-mode="species">Species</button>
        </div>
        <div id="table-root" class="table-wrap"></div>
        <div id="pager-root"></div>
      </section>
      <div id="page-error" class="footer-note"></div>
    </div>
  </main>
  <script src="/BGCMAP/static/app.js?v=20260720"></script>
</body>
</html>
