# BGCMAP Portal - Nginx 配置
# Python 后端运行在 127.0.0.1:8000
# Nginx 监听 0.0.0.0:80 (HTTP) / 443 (HTTPS)

# 速率限制定义
limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=suggest:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # 页面和静态文件 - 允许访问
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API - 需要 Basic Auth
    location /api/ {
        auth_basic "BGCMAP API - 需要认证";
        auth_basic_user_file /etc/nginx/.api_htpasswd;

        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 搜索建议 - 更高的速率限制
    location /api/search-suggest {
        auth_basic "BGCMAP API - 需要认证";
        auth_basic_user_file /etc/nginx/.api_htpasswd;

        limit_req zone=suggest burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查 - 不需要认证
    location /api/health {
        proxy_pass http://127.0.0.1:8000;
    }
}
